services:
  - type: web
    name: serviceperfrAG-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: QDRANT_URL
        sync: false          # your Qdrant Cloud cluster URL
      - key: QDRANT_API_KEY
        sync: false          # your Qdrant Cloud API key
      - key: QDRANT_COLLECTION
        value: serviceperfrag_docs
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after it deploys

  - type: web
    name: serviceperfrAG-frontend
    runtime: docker
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false          # set to https://<your-backend>.onrender.com/api
